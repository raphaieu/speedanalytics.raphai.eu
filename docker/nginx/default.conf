# Legado — deploy manual com nginx + PHP-FPM em containers separados.
# Produção (Coolify): use docker/nginx/coolify.conf no serviço web (container único).

server {
    listen 80;
    server_name _;

    root /var/www/public;
    index index.php;

    client_max_body_size 20M;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 120;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
