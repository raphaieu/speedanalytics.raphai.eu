# Speedway Analytics — Docker Compose para Coolify
#
# Documentação: README.md#docker--coolify-produção · docs/ARCHITECTURE.md
# Variáveis: .env.coolify.example

name: speedanalytics

x-app-environment: &app-environment
  APP_NAME: ${APP_NAME:-Speedway Analytics}
  APP_ENV: ${APP_ENV:-production}
  APP_KEY: ${APP_KEY}
  APP_DEBUG: ${APP_DEBUG:-false}
  APP_URL: ${COOLIFY_URL:-https://speedanalytics.raphai.eu}
  LOG_CHANNEL: stack
  LOG_LEVEL: ${LOG_LEVEL:-info}
  DB_CONNECTION: mysql
  DB_HOST: mysql
  DB_PORT: 3306
  DB_DATABASE: ${DB_DATABASE:-speedanalytics}
  DB_USERNAME: ${DB_USERNAME:-speedanalytics}
  DB_PASSWORD: ${DB_PASSWORD}
  SESSION_DRIVER: database
  SESSION_LIFETIME: 120
  QUEUE_CONNECTION: redis
  CACHE_STORE: redis
  REDIS_CLIENT: phpredis
  REDIS_HOST: redis
  REDIS_PORT: 6379
  SPEEDWAY_COLLECTOR_TOKEN: ${SPEEDWAY_COLLECTOR_TOKEN}

services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE:-speedanalytics}
      MYSQL_USER: ${DB_USERNAME:-speedanalytics}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  web:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
      target: web
    restart: unless-stopped
    expose:
      - "80"
    environment:
      <<: *app-environment
      SERVICE_FQDN_WEB: ""
    volumes:
      - app_storage:/var/www/storage
      - collector_storage:/var/www/collector/storage
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1/up"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 120s

  queue:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
      target: worker
    restart: unless-stopped
    environment:
      <<: *app-environment
    volumes:
      - app_storage:/var/www/storage
      - collector_storage:/var/www/collector/storage
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  collector:
    build:
      context: ./collector
      dockerfile: ../docker/collector/Dockerfile
    restart: unless-stopped
    shm_size: "1gb"
    environment:
      BBTIPS_APP_URL: ${BBTIPS_APP_URL:-https://app.bbtips.com.br}
      BBTIPS_SPEEDWAY_URL: ${BBTIPS_SPEEDWAY_URL:-https://app.bbtips.com.br/speedway/horarios}
      HEADLESS: "true"
      STORAGE_STATE_PATH: ./storage/bbtips-storage-state.json
      PAYLOAD_DIR: ./storage/payloads
      STATUS_FILE: ./storage/collector-status.json
      RACES_INDEX_FILE: ./storage/races-index.json
      RUNS_FILE: ./storage/collector-runs.json
      LOG_FILE: ./storage/collector.log
      HEALTH_CHECK_INTERVAL_MS: ${HEALTH_CHECK_INTERVAL_MS:-60000}
      STALE_THRESHOLD_MS: ${STALE_THRESHOLD_MS:-300000}
      SPEEDWAY_COLLECTOR_ENDPOINT: http://web/api/collector/speedway
      SPEEDWAY_COLLECTOR_TOKEN: ${SPEEDWAY_COLLECTOR_TOKEN}
    volumes:
      - collector_storage:/app/storage
    depends_on:
      web:
        condition: service_healthy
      queue:
        condition: service_started

volumes:
  mysql_data:
  redis_data:
  app_storage:
  collector_storage:
